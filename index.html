<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Discord</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.webp">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <style>
        body { margin: 0; background-color: #313338; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; text-align: center; }
        .instructions { padding: 20px; border: 1px solid #4e5058; border-radius: 15px; background: #2b2d31; }
    </style>
</head>
<body>

    <div id="setup-ui" class="instructions">
        <h2>PWA Setup</h2>
        <p>1. Tap <strong>Share</strong></p>
        <p>2. Tap <strong>Add to Home Screen</strong></p>
    </div>

    <script>
        (function() {
            // Only run the redirect if we are in standalone mode
            if (window.navigator.standalone) {
                // Hide the instructions immediately
                document.getElementById('setup-ui').style.display = 'none';
                
                // Force the location change
                // Using .replace prevents the 'back' button from showing Safari UI
                window.location.replace("https://discord.com/app");
            }
        })();

        // This script catches "clicks" and forces them to stay in the standalone window
        document.addEventListener('click', function(e) {
            var target = e.target.closest('a');
            if (target && target.href) {
                e.preventDefault();
                window.location.href = target.href;
            }
        }, false);
    </script>
</body>
</html>
