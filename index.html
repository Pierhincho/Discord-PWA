<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord PWA</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.webp">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Discord">

    <style>
        body {
            margin: 0;
            background-color: #313338;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .instructions {
            background: #2b2d31;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #4e5058;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h2 { margin-top: 0; color: #fff; }
        p { color: #dbdee1; line-height: 1.6; font-size: 1.1rem; }
        .icon-tip { font-size: 40px; margin-top: 20px; }
        strong { color: #5865F2; }
    </style>
</head>
<body>

    <div class="instructions">
        <h2>PWA Setup</h2>
        <p>1. Tap the <strong>Share</strong> button (bottom bar)</p>
        <p>2. Select <strong>'Add to Home Screen'</strong></p>
        <p>3. Launch the new icon from your home screen!</p>
    </div>

    <div class="icon-tip">📲</div>

    <script>
        // 1. FORCE CHECK: This stops the browser from redirecting automatically
        // window.navigator.standalone is ONLY true when opened from the home screen icon.
        if (window.navigator.standalone === true) {
            // We are in the App! Redirect to Discord immediately.
            window.location.replace("https://discord.com/app");
        } else {
            // We are in Safari. We do NOTHING. 
            // This ensures you can stay on this page to click 'Add to Home Screen'
            console.log("In Safari Browser: Redirect blocked to allow setup.");
        }

        // 2. NAVIGATION LOCK: Prevents external browser pop-ups
        (function(document,navigator,standalone) {
            if ((standalone in navigator) && navigator[standalone]) {
                var curnode, location=document.location, stop=/^(a|html)$/i;
                document.addEventListener('click', function(e) {
                    curnode=e.target;
                    while (!(stop).test(curnode.nodeName)) {
                        curnode=curnode.parentNode;
                    }
                    if('href' in curnode && ( curnode.href.indexOf('http') || ~curnode.href.indexOf(location.host) )) {
                        e.preventDefault();
                        location.href = curnode.href;
                    }
                },false);
            }
        })(document,window.navigator,'standalone');
    </script>
</body>
</html>
