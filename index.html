<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Discord</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.webp">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script>
        // iOS 26 checks for standalone status immediately
        if (window.navigator.standalone) {
            // We use a direct window.top location to try and "hijack" the frame
            window.top.location.replace("https://discord.com/app");
        }
    </script>

    <style>
        body { margin: 0; background: #313338; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { padding: 30px; border-radius: 20px; background: #2b2d31; text-align: center; border: 1px solid #4e5058; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Discord PWA</h2>
        <p>Share > Add to Home Screen</p>
    </div>
</body>
</html>
