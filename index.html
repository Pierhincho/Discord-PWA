<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Discord</title>

    <link rel="manifest" href="manifest.json">
    
    <link rel="apple-touch-icon" href="icon-192.webp">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Discord">

    <style>
        body {
            margin: 0;
            background-color: #313338;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: -apple-system, sans-serif;
            text-align: center;
        }
        .container {
            background: #2b2d31;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #4e5058;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 80%;
        }
        h2 { color: #5865F2; margin-top: 0; }
        p { color: #dbdee1; font-size: 1.1rem; line-height: 1.4; }
    </style>
</head>
<body>

    <div id="setup-screen" class="container">
        <h2>PWA Setup</h2>
        <p>1. Tap the <strong>Share</strong> button</p>
        <p>2. Select <strong>Add to Home Screen</strong></p>
        <p>3. Open the icon from your Home Screen for full-screen!</p>
    </div>

    <script>
        // Check if we are running as a standalone app
        if (window.navigator.standalone === true) {
            // Hide the instructions so they don't flash
            document.getElementById('setup-screen').style.display = 'none';
            
            // Redirect to the actual Discord App
            window.location.replace("https://discord.com/app");
        }
    </script>
</body>
</html>
